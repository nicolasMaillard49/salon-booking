version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: salon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: salon_booking
      POSTGRES_USER: salon
      POSTGRES_PASSWORD: salon_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
